# fly.toml app configuration file generated for onboarding-api-cool-waterfall-8568 on 2026-05-14T22:45:43+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'onboarding-api-cool-waterfall-8568'
primary_region = 'sin'

[deploy]
  release_command = 'pnpm --filter @onboarding/api db:migrate:prod'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/api/v1/health'

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
